name: CI Runner

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
  
    runs-on: amd64

    steps:
      - name: Install System Dependencies
        run: |
          if command -v apk &> /dev/null; then
            apk add --no-cache nodejs curl
          elif command -v apt-get &> /dev/null; then
            apt-get update
            apt-get install -y nodejs curl
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Python, pipx, invoke
        run: |
          if command -v apk &> /dev/null; then
            apk add --no-cache python3 py3-pip gcc python3-dev musl-dev linux-headers
            python3 -m pip install pipx --break-system-packages || python3 -m pip install pipx
          elif command -v apt-get &> /dev/null; then
            apt-get update
            apt-get install -y python3 python3-pip pipx
          fi
          
          export PATH="$PATH:$HOME/.local/bin"
          pipx ensurepath
          pipx install invoke
          pipx inject invoke colorama psutil
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: Run CI task
        run: invoke ci
